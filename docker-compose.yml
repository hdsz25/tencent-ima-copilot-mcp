version: '3.8'

services:
  ima-mcp-server:
    image: highkay/tencent-ima-copilot-mcp:latest
    container_name: ima-copilot-mcp
    restart: unless-stopped

    # Required environment variables - MUST be provided
    environment:
      # ===== 必需配置 =====
      # 从浏览器开发者工具获取（详见 README.md）
      IMA_X_IMA_COOKIE: "${IMA_X_IMA_COOKIE}"
      IMA_X_IMA_BKN: "${IMA_X_IMA_BKN}"
      # 知识库 ID 可选；也可以仅凭认证信息启动后执行 sync_knowledge_bases 自动发现
      IMA_KNOWLEDGE_BASE_ID: "${IMA_KNOWLEDGE_BASE_ID:-}"
      IMA_KNOWLEDGE_BASE_IDS: "${IMA_KNOWLEDGE_BASE_IDS:-}"
      IMA_KNOWLEDGE_BASE_CATALOG_FILE: "${IMA_KNOWLEDGE_BASE_CATALOG_FILE:-/app/data/.ima_knowledge_bases.json}"

      # ===== 可选配置（已有默认值）=====
      # 完整的 Cookie 字符串（可选）
      # IMA_COOKIES: "${IMA_COOKIES:-}"

      # 设备标识和客户端ID（留空则自动生成）
      # IMA_USKEY: "${IMA_USKEY:-}"
      # IMA_CLIENT_ID: "${IMA_CLIENT_ID:-}"

      # 服务器配置
      IMA_MCP_HOST: "0.0.0.0"
      IMA_MCP_PORT: "8081"
      IMA_MCP_DEBUG: "${IMA_MCP_DEBUG:-false}"
      IMA_MCP_LOG_LEVEL: "${IMA_MCP_LOG_LEVEL:-INFO}"

      # API 配置
      IMA_REQUEST_TIMEOUT: "${IMA_REQUEST_TIMEOUT:-30}"
      IMA_RETRY_COUNT: "${IMA_RETRY_COUNT:-3}"
      IMA_ASK_CONCURRENCY_LIMIT: "${IMA_ASK_CONCURRENCY_LIMIT:-2}"

      # 代理设置（可选）
      # IMA_PROXY: "${IMA_PROXY:-}"

    ports:
      - "8081:8081"

    # 持久化日志
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      # 如果希望容器内 sync_knowledge_bases 回写的 .env 也持久化，可取消下面注释
      # - ./.env:/app/.env

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    # Resource limits (optional, adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
